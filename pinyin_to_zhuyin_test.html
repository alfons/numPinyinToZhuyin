      testData.forEach(item => {

        const computed = numPinyinToZhuyin(inputWithTone);
        const status = computed === item.expected 
          ? '<span class="match">✓ PASS</span>' 
          : '<span class="fail">✗ FAIL</span>';

        const row = document.createElement('tr');
        row.innerHTML = `
          <td><code>${inputWithTone}</code></td>
          <td><code>${item.expected}</code></td>
          <td><code>${computed}</code></td>
          <td>${status}</td>
        `;
        tbody.appendChild(row);
      });
    }
